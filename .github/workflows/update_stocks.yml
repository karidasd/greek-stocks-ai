name: Greek Stocks AI Update

on:
  schedule:
    # Run at 17:45 UTC (20:45 Greek Time) every day, after market closes
    - cron: '45 17 * * 1-5' # Runs Monday to Friday
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch_stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Greek Stocks AI Script
      run: |
        python scripts/fetch_stocks.py

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated Greek Stocks AI update"
        file_pattern: "data/*.json"
